name: Cleanup Rate Limits

on:
  schedule:
    # Run every Sunday at 3:00 AM UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      hours:
        description: Delete records older than X hours
        required: false
        default: "168"

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run cleanup script
        run: npx tsx scripts/cleanup-rate-limits.ts ${{ github.event.inputs.hours || '168' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
